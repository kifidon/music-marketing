<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cool vinyl — embed</title>
  <style>
    :root {
      --bg: #0c0d10;
      --spot: rgba(255, 248, 235, 0.06);
      --vinyl: #121318;
      --groove: rgba(255, 255, 255, 0.04);
      --label: linear-gradient(145deg, #2a1f35 0%, #1a1422 40%, #3d2848 100%);
      --rim: #1e1f26;
      --shine: linear-gradient(
        125deg,
        transparent 0%,
        transparent 40%,
        rgba(255, 255, 255, 0.12) 48%,
        rgba(255, 255, 255, 0.22) 50%,
        rgba(255, 255, 255, 0.08) 52%,
        transparent 60%,
        transparent 100%
      );
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    /* Optional: vignette spotlight behind the disc */
    .stage {
      position: relative;
      width: min(100vw - 48px, 380px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      background: radial-gradient(
        circle at 35% 30%,
        rgba(255, 200, 160, 0.14) 0%,
        transparent 55%
      ),
      radial-gradient(circle at 50% 50%, var(--spot) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .vinyl-wrap {
      position: relative;
      z-index: 1;
      width: 88%;
      aspect-ratio: 1;
      filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.65))
        drop-shadow(0 0 1px rgba(255, 255, 255, 0.04));
    }

    .vinyl {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        /* center hole */
        radial-gradient(circle at 50% 50%, var(--bg) 0%, var(--bg) 3.2%, transparent 3.25%),
        /* label */
        radial-gradient(circle at 50% 50%, transparent 28%, transparent 28.5%, var(--label) 28.5%, var(--label) 42%, transparent 42.2%),
        /* grooves */
        repeating-radial-gradient(
          circle at 50% 50%,
          transparent 0,
          transparent 2px,
          var(--groove) 2px,
          var(--groove) 3px
        ),
        radial-gradient(circle at 50% 50%, #1a1b22 0%, var(--vinyl) 45%, var(--rim) 100%);
      animation: spin 48s linear infinite;
    }

    .vinyl::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--shine);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.85;
      animation: shine-drift 14s ease-in-out infinite alternate;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shine-drift {
      from { transform: rotate(-6deg) scale(1); opacity: 0.75; }
      to { transform: rotate(8deg) scale(1.02); opacity: 0.95; }
    }

    /* Tonearm silhouette (static) */
    .arm {
      position: absolute;
      top: -2%;
      right: 4%;
      width: 42%;
      height: 22%;
      z-index: 2;
      pointer-events: none;
      transform-origin: 100% 100%;
      transform: rotate(-18deg);
      filter: drop-shadow(-2px 4px 6px rgba(0, 0, 0, 0.5));
    }

    .arm-pivot {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 14%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #4a4d5a, #22242c);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .arm-bar {
      position: absolute;
      right: 6%;
      bottom: 40%;
      width: 88%;
      height: 18%;
      border-radius: 4px;
      background: linear-gradient(180deg, #3a3d48, #25262e);
      transform-origin: 100% 50%;
      transform: rotate(-8deg);
    }

    .arm-head {
      position: absolute;
      left: -2%;
      top: 50%;
      width: 22%;
      height: 140%;
      margin-top: -70%;
      border-radius: 3px;
      background: linear-gradient(90deg, #2e3038, #1a1b20);
      box-shadow: 2px 0 4px rgba(0, 0, 0, 0.4);
    }

    .label-text {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      width: 22%;
      text-align: center;
      font-size: clamp(8px, 2.2vw, 11px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 245, 255, 0.55);
      line-height: 1.35;
      pointer-events: none;
      z-index: 1;
      animation: spin 48s linear infinite reverse;
    }

    @media (prefers-reduced-motion: reduce) {
      .vinyl,
      .vinyl::after,
      .label-text {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="stage" role="img" aria-label="Decorative spinning vinyl record">
    <div class="vinyl-wrap">
      <div class="arm" aria-hidden="true">
        <div class="arm-pivot"></div>
        <div class="arm-bar">
          <div class="arm-head"></div>
        </div>
      </div>
      <div class="vinyl"></div>
      <div class="label-text" aria-hidden="true">Side<br>A</div>
    </div>
  </div>
</body>
</html>
