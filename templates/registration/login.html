{% extends "base_app.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <div class="panel" style="max-width:440px">
    <h1 style="margin-top:0">Log in</h1>
    {% if form.errors %}
      <p class="muted" style="color:#f28b82">Please correct the errors below.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-row">
        <label for="id_username">Username</label>
        <input type="text" name="username" autofocus required id="id_username" value="{{ form.username.value|default:'' }}">
      </div>
      <div class="form-row">
        <label for="id_password">Password</label>
        <input type="password" name="password" required id="id_password">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button class="btn btn-primary" type="submit">Log in</button>
    </form>
  </div>
{% endblock %}
